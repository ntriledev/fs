<svg width="650" height="200" viewBox="0 0 650 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- BLUE GRADIENT (Flirt) -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #00C6FF; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #0072FF; stop-opacity: 1" />
    </linearGradient>

    <!-- RED GRADIENT (Spot & Heart) -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #FF512F; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #F09819; stop-opacity: 1" />
    </linearGradient>

    <!-- WIFI GRADIENT (Cyan/Light Blue) -->
    <linearGradient id="wifiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #4FACFE; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #00F2FE; stop-opacity: 1" />
    </linearGradient>

    <!-- SHADOW (For Pop) -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- === FLIRT (Blue - Unchanged) === -->
  <g transform="translate(20,60)" filter="url(#softShadow)">
    <!-- f -->
    <path d="M 25 100 L 25 30 Q 25 0 55 0 H 65 V 20 H 55 Q 43 20 43 30 L 43 40 H 65 V 60 H 43 L 43 100 H 25 Z" fill="url(#blueGrad)"/>
    <!-- l -->
    <path d="M 80 0 H 98 V 100 H 80 Z" fill="url(#blueGrad)"/>
    <!-- i (Blue Stem + Red Heart) -->
    <g transform="translate(110)">
      <path d="M 10 40 H 28 V 100 H 10 Z" fill="url(#blueGrad)"/>
      <path d="M 19 -5 C 19 -5 35 -20 44 -11 C 50 -5 50 5 44 13 L 19 37 L -6 13 C -12 5 -12 -5 -6 -11 C 3 -20 19 -5 19 -5 Z" 
            fill="red"/>
    </g>
    <!-- r -->
    <path d="M 155 100 V 40 H 173 V 55 Q 173 40 195 40 V 60 Q 180 60 173 70 V 100 H 155 Z" fill="url(#blueGrad)"/>
    <!-- t -->
    <path d="M 215 100 V 40 H 200 V 20 H 215 V 5 H 233 V 20 H 250 V 40 H 233 V 90 Q 233 100 243 100 H 250 V 115 H 240 Q 215 115 215 100 Z" fill="url(#blueGrad)"/>
  </g>


  <!-- === WIFI SIGNAL (Center) === -->
  <g transform="translate(310,160)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="15" fill="darkblue"/>
    <path d="M -18 -15 A 25 25 0 0 1 18 -15" fill="none" stroke="url(#wifiGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M -30 -30 A 45 45 0 0 1 30 -30" fill="none" stroke="url(#wifiGrad)" stroke-width="8" stroke-linecap="round"/>
  </g>


  <!-- === SPOT (Red - Amended for Readability) === -->
  <g transform="translate(320,60)" filter="url(#softShadow)">
    
    <!-- s (Clean Geometric Curve) -->
    <path d="M 55 40 C 75 40 80 55 80 60 H 62 C 62 55 60 53 55 53 C 48 53 45 56 45 60 C 45 65 50 67 58 69 L 62 70 C 78 74 82 85 82 92 C 82 108 70 115 55 115 C 35 115 28 100 28 95 H 46 C 46 100 48 103 55 103 C 62 103 65 99 65 94 C 65 88 60 86 52 84 L 48 83 C 32 79 28 68 28 60 C 28 45 40 40 55 40 Z" fill="url(#redGrad)"/>

    <!-- p (Standard Vertical Stem + Round Bowl) -->
    <path d="M 95 40 H 113 V 53 Q 118 40 135 40 Q 155 40 155 75 Q 155 110 135 110 Q 118 110 113 97 V 140 H 95 V 40 Z M 113 75 Q 113 95 125 95 Q 137 95 137 75 Q 137 55 125 55 Q 113 55 113 75 Z" fill="url(#redGrad)"/>

    <!-- o (Standard Donut) -->
    <path d="M 165 75 Q 165 40 200 40 Q 235 40 235 75 Q 235 110 200 110 Q 165 110 165 75 Z M 183 75 Q 183 95 200 95 Q 217 95 217 75 Q 217 55 200 55 Q 183 55 183 75 Z" fill="url(#redGrad)"/>

    <!-- t (Standard Curved Bottom) -->
    <path d="M 260 100 V 40 H 245 V 20 H 260 V 5 H 278 V 20 H 295 V 40 H 278 V 90 Q 278 100 288 100 H 295 V 115 H 285 Q 260 115 260 100 Z" fill="url(#redGrad)"/>
  </g>

</svg>